<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estimador de Carga EV ⚡</title>

    <!-- Toastify CSS (CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />

    <!-- Estilos propios -->
    <link rel="stylesheet" href="style/main.css" />
    </head>
    <body>

    <div class="container">
        <header class="hero">
        <span class="hero__icon">⚡</span>
        <h1 class="hero__title">Estimador de Carga EV</h1>
        <p class="hero__sub">Calcula cuánto tiempo tarda en cargar tu vehículo eléctrico</p>
        </header>

        <main class="card">
        <div class="field">
            <label class="field__label" for="current">Batería actual (%)</label>
            <input class="field__input" id="current" type="number" min="0" max="100" placeholder="Ej: 20" />
        </div>

        <div class="field">
            <label class="field__label" for="target">Objetivo de carga (%)</label>
            <input class="field__input" id="target" type="number" min="0" max="100" placeholder="Ej: 80" />
        </div>

        <div class="field">
            <label class="field__label" for="charger">Tipo de cargador</label>
            <select class="field__select" id="charger">
            <option value="">Cargando opciones...</option>
            </select>
        </div>

        <div class="field">
        <label class="field__label" for="startTime">¿A qué hora empiezas a cargar?</label>
        <input class="field__input" id="startTime" type="time" value="22:00" />
        </div>

        <button class="btn" id="calculateBtn">Calcular ⚡</button>

        <div class="result" id="result" hidden></div>
        </main>
    </div>

    <!-- Toastify JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <!-- Módulos propios -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
